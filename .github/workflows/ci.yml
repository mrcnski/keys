name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '25.3'
          - '26.3'
          - '27.2'
          - '28.2'
          - '29.4'
          - snapshot
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Byte-compile (warnings are errors)
        run: |
          emacs -Q --batch \
            --eval "(setq byte-compile-error-on-warn t)" \
            -f batch-byte-compile keys.el

      - name: Run tests
        run: |
          emacs -Q --batch -L . -l keys-test.el -f ert-run-tests-batch-and-exit
